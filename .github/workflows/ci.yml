name: Lab-04

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.publish.outputs.artifact-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Publish artifact name
        id: publish
        run: echo "artifact-name=build-output" >> $GITHUB_OUTPUT

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.publish.outputs.artifact-name }}
          path: dist/

  inspect:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Show artifact name
        run: echo "Artifact name: ${{ needs.build.outputs.artifact-name }}"

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist/

      - name: List files
        run: ls -R dist/
